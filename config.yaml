# Конфигурация приложения расчёта зоны видимости

# Путь к CSV-файлу с матрицей высот
heights_path: "alt.csv"

# Разделитель в CSV-файле
csv_delimiter: ","

# Ожидаемый размер матрицы (используется для валидации)
matrix_rows: 50
matrix_cols: 50

# Папка для сохранения изображений визуализации
output_dir: "output"

# Параметры алгоритма
algorithm:
  # Считать ли границу радиуса включительно
  include_boundary: true
  # Множитель шагов трассировки луча (1.0 = базовое значение, выше = точнее)
  ray_step_multiplier: 2.0
